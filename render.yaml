services:
  - type: web
    name: quizzer
    runtime: python
    buildCommand: pip install uv && uv sync
    startCommand: uv run -m src.ui.app
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LANGSMITH_TRACING
        value: "true"
      - key: LANGSMITH_API_KEY
        sync: false
